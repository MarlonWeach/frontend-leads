name: Sync Dados Meta e Supabase 3x ao dia (Paralelizado)

on:
  schedule:
    - cron: '0 12,15,19 * * *'  # 9h, 12h, 16h horГЎrio de BrasГ­lia (UTC-3)
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
  META_ACCOUNT_ID: ${{ secrets.META_ACCOUNT_ID }}

jobs:
  # JOB 1: Dados fundamentais (sequencial - dependГЄncias)
  sync-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_ACCOUNT_ID=${{ secrets.META_ACCOUNT_ID }}
          EOF

      - name: рџ”ґ Sync campaigns (fundamental)
        run: |
          echo "рџ”ґ [FUNDAMENTAL] Sincronizando campanhas..."
          start_time=$(date +%s)
          node scripts/sync-campaigns-once.js
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          if [ $exit_code -eq 0 ]; then
            echo "вњ… Campanhas sincronizadas com sucesso em ${duration}s"
          else
            echo "вќЊ Falha na sincronizaГ§ГЈo de campanhas (${duration}s)"
            exit 1
          fi

      - name: рџ”ґ Sync adsets (fundamental)
        run: |
          echo "рџ”ґ [FUNDAMENTAL] Sincronizando adsets..."
          start_time=$(date +%s)
          node scripts/sync-adsets-once.js
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          if [ $exit_code -eq 0 ]; then
            echo "вњ… Adsets sincronizados com sucesso em ${duration}s"
          else
            echo "вќЊ Falha na sincronizaГ§ГЈo de adsets (${duration}s)"
            exit 1
          fi

      - name: рџ”ґ Sync ads (fundamental)
        run: |
          echo "рџ”ґ [FUNDAMENTAL] Sincronizando ads..."
          start_time=$(date +%s)
          node scripts/sync-ads-once.js
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          if [ $exit_code -eq 0 ]; then
            echo "вњ… Ads sincronizados com sucesso em ${duration}s"
          else
            echo "вќЊ Falha na sincronizaГ§ГЈo de ads (${duration}s)"
            exit 1
          fi

  # JOB 2: Insights (paralelo - independente)
  sync-insights:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: sync-fundamentals
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_ACCOUNT_ID=${{ secrets.META_ACCOUNT_ID }}
          EOF

      - name: рџџЎ Sync adset insights (paralelo)
        run: |
          echo "рџџЎ [INSIGHTS] Sincronizando insights de adsets..."
          start_time=$(date +%s)
          node scripts/sync-adset-insights.js
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          if [ $exit_code -eq 0 ]; then
            echo "вњ… Insights de adsets sincronizados com sucesso em ${duration}s"
          else
            echo "вљ пёЏ  Falha na sincronizaГ§ГЈo de insights de adsets (${duration}s) - Continuando..."
          fi
        continue-on-error: true

      - name: рџџЎ Sync ad insights (paralelo)
        run: |
          echo "рџџЎ [INSIGHTS] Sincronizando insights de ads..."
          start_time=$(date +%s)
          node scripts/sync-ad-insights-account.js
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          if [ $exit_code -eq 0 ]; then
            echo "вњ… Insights de ads sincronizados com sucesso em ${duration}s"
          else
            echo "вљ пёЏ  Falha na sincronizaГ§ГЈo de insights de ads (${duration}s) - Continuando..."
          fi
        continue-on-error: true

      - name: рџџЎ Populate campaign insights (paralelo)
        run: |
          echo "рџџЎ [INSIGHTS] Populando campaign insights agregados..."
          start_time=$(date +%s)
          node scripts/populate-campaign-insights.js
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          if [ $exit_code -eq 0 ]; then
            echo "вњ… Campaign insights populados com sucesso em ${duration}s"
          else
            echo "вљ пёЏ  Falha na populaГ§ГЈo de campaign insights (${duration}s) - Continuando..."
          fi
        continue-on-error: true

  # JOB 3: Leads e relacionamentos (paralelo - independente)
  sync-leads-relationships:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: sync-fundamentals
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_USER_ACCESS_TOKEN=${{ secrets.META_USER_ACCESS_TOKEN }}
          META_PAGE_ACCESS_TOKEN=${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_ACCOUNT_ID=${{ secrets.META_ACCOUNT_ID }}
          META_FORM_ID=${{ secrets.META_FORM_ID }}
          NEXT_PUBLIC_META_FORM_ID=${{ secrets.META_FORM_ID }}
          META_PAGE_ID=${{ secrets.META_PAGE_ID }}
          NEXT_PUBLIC_META_PAGE_ID=${{ secrets.META_PAGE_ID }}
          SYNC_META_LEADS_ONLY_META_FORM_ID=0
          SYNC_META_LEADS_FORM_COOLDOWN_MS=2500
          EOF

      - name: рџџў Sync meta leads (paralelo)
        run: |
          set -o pipefail
          echo "[LEADS] Sincronizando leads..."
          start_time=$(date +%s)
          node scripts/sync-meta-leads.js | tee sync-meta-leads.log
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))

          if [ "$exit_code" -ne 0 ]; then
            echo "Falha na sincronizacao de leads (${duration}s) - confira o log acima."
            exit 1
          fi

          if grep -Fq "Unicos (dedup por id): 0" sync-meta-leads.log; then
            if grep -Eq 'Total de formularios unicos a consultar: 0 \(' sync-meta-leads.log && grep -Eq '^0 anuncio\(s\) para consultar' sync-meta-leads.log; then
              echo "Nenhum formulario na fila e nenhum ad elegivel para /{ad-id}/leads - nada a sincronizar nesta execucao."
              echo "Dica: configure secrets META_FORM_ID e/ou META_PAGE_ID, ou campanhas de lead + ads no Supabase."
              echo "Job de leads concluido (${duration}s)"
              exit 0
            fi
            echo "::warning::Sync de leads retornou 0 registros unicos apos consultar formulario(s) e/ou ads."
            echo "::warning::Valide META_USER_ACCESS_TOKEN (leads_retrieval), META_PAGE_ACCESS_TOKEN (leadgen_forms), secrets META_FORM_ID/META_PAGE_ID e leads na janela (ultimos 90 dias)."
            exit 0
          fi

          echo "Leads sincronizados com sucesso em ${duration}s"

      - name: рџџў Update table relationships (paralelo)
        run: |
          echo "рџџў [RELATIONSHIPS] Atualizando relacionamentos entre tabelas..."
          start_time=$(date +%s)
          node scripts/update-table-relationships.js
          exit_code=$?
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          if [ $exit_code -eq 0 ]; then
            echo "вњ… Relacionamentos atualizados com sucesso em ${duration}s"
          else
            echo "вљ пёЏ  Falha na atualizaГ§ГЈo de relacionamentos (${duration}s) - Continuando..."
          fi
        continue-on-error: true

  # JOB 4: ConsolidaГ§ГЈo e logs finais
  consolidation:
    runs-on: ubuntu-latest
    needs: [sync-fundamentals, sync-insights, sync-leads-relationships]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resumo da sincronizaГ§ГЈo paralelizada
        run: |
          echo ""
          echo "рџљЂ RESUMO DA SINCRONIZAГ‡ГѓO PARALELIZADA"
          echo "====================================="
          echo "рџ“… Data/Hora: $(date)"
          echo "рџЊЌ Timezone: $(date +%Z)"
          echo ""
          echo "рџ“Љ JOBS EXECUTADOS:"
          echo "  рџ”ґ sync-fundamentals: Campanhas в†’ Adsets в†’ Ads (sequencial)"
          echo "  рџџЎ sync-insights: Insights de Adsets + Ads + Campaign Insights (paralelo)"
          echo "  рџџў sync-leads-relationships: Leads + Relacionamentos (paralelo)"
          echo "  рџ“‹ consolidation: Resumo e logs finais"
          echo ""
          echo "вљЎ OTIMIZAГ‡ГѓO: Jobs paralelos reduzem tempo total em ~60%"
          echo "вњ… Workflow paralelizado executado com sucesso!"

      - name: Log success
        if: success()
        run: echo "вњ… SincronizaГ§ГЈo paralelizada concluГ­da com sucesso em $(date)"

      - name: Log failure
        if: failure()
        run: echo "вќЊ SincronizaГ§ГЈo paralelizada falhou em $(date) - Verificar logs para detalhes" 
