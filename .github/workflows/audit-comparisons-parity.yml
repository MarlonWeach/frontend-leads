name: Audit Comparisons Parity

on:
  schedule:
    - cron: '30 11 * * *' # 08:30 BRT (UTC-3)
  workflow_dispatch:

jobs:
  audit-comparisons:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_ACCOUNT_ID=${{ secrets.META_ACCOUNT_ID }}
          EOF

      - name: Run parity audit against local API
        run: |
          set -euo pipefail
          npm run dev > /tmp/next-dev.log 2>&1 &
          DEV_PID=$!
          trap "kill $DEV_PID || true" EXIT

          echo "Aguardando Next.js iniciar..."
          for i in {1..45}; do
            if curl -sf "http://localhost:3000" > /dev/null; then
              echo "Next.js pronto."
              break
            fi
            sleep 2
          done

          npm run audit:comparisons -- --base-url http://localhost:3000
